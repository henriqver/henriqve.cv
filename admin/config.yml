backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/projetos"
public_folder: "assets/images/projetos"

collections:
  - name: "portfolio"
    label: "Portfólio"
    files:
      - label: "Meus Projetos"
        name: "projetos"
        file: "projetos.json"
        fields:
          - label: "Lista de Projetos"
            name: "lista"
            widget: "list"
            fields:
              - {label: "ID do Projeto", name: "id", widget: "string"}
              - {label: "Título do Projeto", name: "titulo", widget: "string"}
              - {label: "Ano", name: "ano", widget: "string"}
              - {label: "Categoria", name: "categoria", widget: "string"}
              - {label: "Descrição", name: "descricao", widget: "text"}
              
              # Novos campos para ícones[cite: 1]
              - {label: "Software (ex: Photoshop, Illustrator, IA)", name: "software", widget: "string", hint: "Separe por vírgula"}
              - {label: "Campo (ex: Branding, Editorial, Tipografia)", name: "campo", widget: "string", hint: "Separe por vírgula"}

              - label: "Formato da Galeria"
                name: "formato_galeria"
                widget: "select"
                options: 
                  - {label: "Cortar (Mosaico 4:5)", value: "cortar"}
                  - {label: "Inteira (Proporção Original)", value: "original"}
                default: "cortar"

              - label: "Instruções de Imagem"
                name: "helper"
                widget: "hidden"
                default: "Capa: id (0). Galeria: id (1), id (2), etc."