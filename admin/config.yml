backend:
  name: git-gateway
  branch: main

# Pasta onde as imagens serão armazenadas fisicamente
media_folder: "assets/images/projetos"
# Caminho público para acesso via site
public_folder: "assets/images/projetos"

collections:
  - name: "portfolio"
    label: "Portfólio"
    files:
      - label: "Meus Projetos"
        name: "projetos"
        file: "projetos.json"
        fields:
          - label: "Lista de Projetos"
            name: "lista"
            widget: "list"
            fields:
              - {label: "ID do Projeto (ex: trofeu-pele)", name: "id", widget: "string"}
              - {label: "Título do Projeto", name: "titulo", widget: "string"}
              - {label: "Ano", name: "ano", widget: "string"}
              - {label: "Categoria", name: "categoria", widget: "string"}
              - {label: "Cliente", name: "cliente", widget: "string"}
              - {label: "Seu Papel", name: "papel", widget: "string"}
              - {label: "Descrição", name: "descricao", widget: "text"}
              
              # Opção para controlar o visual da galeria (Opção 2)
              - label: "Formato da Galeria"
                name: "formato_galeria"
                widget: "select"
                options: 
                  - {label: "Cortar (Mosaico 4:5)", value: "cortar"}
                  - {label: "Inteira (Proporção Original)", value: "original"}
                default: "cortar"

              # Lembrete visual sobre a automação de pastas
              - label: "Instruções de Imagem"
                name: "helper"
                widget: "hidden"
                default: "Capa: id (0). Galeria: id (1), id (2), etc. na pasta assets/images/projetos/{{id}}/"
