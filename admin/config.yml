backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/projetos"
public_folder: "assets/images/projetos"

collections:
  - name: "portfolio"
    label: "Portfólio"
    files:
      - label: "Meus Projetos"
        name: "projetos"
        file: "projetos.json"
        fields:
          - label: "Lista de Projetos"
            name: "lista"
            widget: "list"
            fields:
              - {label: "ID do Projeto", name: "id", widget: "string"}
              
              # Títulos em dois idiomas
              - {label: "Título do Projeto (PT)", name: "titulo", widget: "string"}
              - {label: "Título do Projeto (EN)", name: "titulo_en", widget: "string", required: false}
              
              - {label: "Ano", name: "ano", widget: "string"}
              
              # Categorias em dois idiomas
              - {label: "Categoria (PT)", name: "categoria", widget: "string"}
              - {label: "Categoria (EN)", name: "categoria_en", widget: "string", required: false}
              
              # Descrições usando Markdown para permitir quebras de linha e negrito
              - {label: "Descrição (PT)", name: "descricao", widget: "markdown"}
              - {label: "Descrição (EN)", name: "descricao_en", widget: "markdown", required: false}
              
              # Software com as opções e ícones que configuramos no script
              - label: "Software"
                name: "software"
                widget: "select"
                multiple: true
                options: 
                  - "Photoshop"
                  - "Illustrator"
                  - "InDesign"
                  - "IA"
                  - "After Effects"
                  - "Premiere Pro"
                default: ["Photoshop", "Illustrator"]

              # Opção para controlar o comportamento visual da galeria
              - label: "Formato da Galeria"
                name: "formato_galeria"
                widget: "select"
                options: 
                  - {label: "Cortar (Mosaico 4:5)", value: "cortar"}
                  - {label: "Inteira (Proporção Original)", value: "original"}
                default: "cortar"

              # Campo informativo para lembrar o padrão de nomes das fotos
              - label: "Instruções de Imagem"
                name: "helper"
                widget: "hidden"
                default: "Capa: id (0). Galeria: id (1), id (2), etc."