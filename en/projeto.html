<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto | Henrique R</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111111;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e; --text: #f0ede8; --muted: #888880; --dim: #444440;
    --serif: 'Cormorant Garamond', Georgia, serif; --mono: 'Space Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  
  nav { position: fixed; top: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
  .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-style: italic; text-decoration: none; color: var(--text); }

  header { margin-top: 120px; padding: 0 5%; display: grid; grid-template-columns: 1fr 300px; gap: 60px; align-items: start; }
  .project-title { font-size: 4rem; font-family: var(--serif); font-weight: 300; margin-bottom: 20px; grid-column: 1 / -1; }
  .project-desc { font-size: 1.2rem; color: var(--muted); line-height: 1.6; }

  .project-meta-grid { border-top: 1px solid var(--border); padding-top: 20px; display: flex; flex-direction: column; gap: 20px; }
  .meta-item label { display: block; color: var(--accent); font-size: 9px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
  .meta-item span { font-size: 13px; color: var(--text); }

  .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-flow: dense; gap: 20px; padding: 5%; margin-top: 40px; }
  .gallery-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; cursor: zoom-in; transition: opacity 0.3s; }
  .gallery-img.landscape { grid-column: span 2; }

  .tools-section { padding: 4rem 5% 100px; border-top: 1px solid var(--border); margin: 0 5%; }
  .tools-row { display: flex; flex-wrap: wrap; gap: 2.5rem; align-items: flex-start; }
  .tool-item { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; width: 60px; }
  .tool-icon { width: 48px; height: 48px; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; background: var(--surface); transition: border-color 0.3s; }
  .tool-item:hover .tool-icon { border-color: var(--accent); }
  .tool-icon svg { width: 24px; height: 24px; }
  .tool-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.4; }

  /* Rodapé Sincronizado[cite: 2, 3] */
  footer { padding: 60px 5%; border-top: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  .footer-brand { color: var(--accent); font-family: var(--serif); font-size: 1.5rem; font-style: italic; letter-spacing: 0; }
  .footer-socials { display: flex; gap: 25px; }
  .footer-socials a { color: var(--muted); transition: color 0.3s, transform 0.3s; display: flex; align-items: center; justify-content: center; }
  .footer-socials a:hover { color: var(--accent); transform: translateY(-2px); }
  .footer-socials svg { width: 18px; height: 18px; }

  #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

  @media (max-width: 768px) {
    header { grid-template-columns: 1fr; gap: 30px; }
    .project-title { font-size: 2.5rem; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Henrique R</a>
  <div class="nav-links">
    <a href="index.html#work">Projects</a>

    <a href="contato.html">Contact</a>

<header>

  <aside class="project-meta-grid">

  <div class="footer-socials">

    <a href="https://instagram.com/henriqver" target="_blank" aria-label="Instagram">

<div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const idProjeto = urlParams.get('id');

    if (!idProjeto) {
      document.getElementById('projeto-detalhes').innerHTML = '<p>Project not found.</p>';
      return;
    }

    // 1. Busca o JSON voltando uma pasta (../)
    fetch('../projetos.json')
      .then(response => response.json())
      .then(data => {
        const projeto = data.lista.find(p => p.id === idProjeto);

        if (projeto) {
          // 2. Prioriza os campos em inglês (titulo_en, categoria_en, descricao_en)
          document.getElementById('projeto-titulo').innerText = projeto.titulo_en || projeto.titulo;
          document.getElementById('projeto-categoria').innerText = projeto.categoria_en || projeto.categoria;
          
          // 3. Converte a descrição em inglês do CMS (usando sua função de markdown)
          const descricaoHTML = converterMarkdown(projeto.descricao_en || projeto.descricao);
          document.getElementById('projeto-descricao').innerHTML = descricaoHTML;

          // 4. Carregamento da galeria com caminhos ajustados
          const galeria = document.getElementById('projeto-galeria');
          const totalFotos = 30; // Ajuste conforme a média de fotos dos seus projetos
          const extensoes = ['.webp', '.png', '.jpg', '.jpeg'];

          for (let i = 1; i <= totalFotos; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'gallery-item';
            wrapper.id = `foto-${i}`;
            galeria.appendChild(wrapper);

            let encontrou = false;
            const testarFoto = (extIndex) => {
              if (extIndex >= extensoes.length || encontrou) return;
              
              const imgObj = new Image();
              // Adicionado ../ para buscar as imagens na pasta correta
              imgObj.src = `../assets/images/projetos/${idProjeto}/${i}${extensoes[extIndex]}`;
              
              imgObj.onload = () => {
                encontrou = true;
                wrapper.innerHTML = `<img src="${imgObj.src}" loading="lazy" alt="${projeto.titulo_en || projeto.titulo}">`;
              };
              imgObj.onerror = () => { testarFoto(extIndex + 1); };
            };
            testarFoto(0);
          }
        }
      })
      .catch(err => console.error("Erro ao carregar projeto:", err));
  });

  // Sua função de conversão de Markdown (mantenha-a abaixo do DOMContentLoaded)
  function converterMarkdown(texto) {
    if (!texto) return "";
    return texto
      .replace(/### (.*)/g, '<h3>$1</h3>')
      .replace(/## (.*)/g, '<h2>$1</h2>')
      .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }
</script>
