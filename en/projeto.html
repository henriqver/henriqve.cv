<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto | Henrique R</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111111;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e; --text: #f0ede8; --muted: #888880; --dim: #444440;
    --serif: 'Cormorant Garamond', Georgia, serif; --mono: 'Space Mono', monospace;
  }
  
  /* Estilos do Menu de Navegação */
  nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 3rem; }
  .nav-logo { font-family: var(--serif); font-size: 1.5rem; font-style: italic; font-weight: 600; color: var(--accent); text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a { font-family: var(--mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--accent); }
  
  /* Resto do seu CSS continua aqui para baixo... */
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  
  nav { position: fixed; top: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
  .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-style: italic; text-decoration: none; color: var(--text); }

  header { margin-top: 120px; padding: 0 5%; display: grid; grid-template-columns: 1fr 300px; gap: 60px; align-items: start; }
  .project-title { font-size: 4rem; font-family: var(--serif); font-weight: 300; margin-bottom: 20px; grid-column: 1 / -1; }
  .project-desc { font-size: 1.2rem; color: var(--muted); line-height: 1.6; }

  .project-meta-grid { border-top: 1px solid var(--border); padding-top: 20px; display: flex; flex-direction: column; gap: 20px; }
  .meta-item label { display: block; color: var(--accent); font-size: 9px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
  .meta-item span { font-size: 13px; color: var(--text); }

  .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-flow: dense; gap: 20px; padding: 5%; margin-top: 40px; }
  .gallery-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; cursor: zoom-in; transition: opacity 0.3s; }
  .gallery-img.landscape { grid-column: span 2; }

  .tools-section { padding: 4rem 5% 100px; border-top: 1px solid var(--border); margin: 0 5%; }
  .tools-row { display: flex; flex-wrap: wrap; gap: 2.5rem; align-items: flex-start; }
  .tool-item { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; width: 60px; }
  .tool-icon { width: 48px; height: 48px; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; background: var(--surface); transition: border-color 0.3s; }
  .tool-item:hover .tool-icon { border-color: var(--accent); }
  .tool-icon svg { width: 24px; height: 24px; }
  .tool-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.4; }

  /* Rodapé Sincronizado[cite: 2, 3] */
  footer { padding: 60px 5%; border-top: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  .footer-brand { color: var(--accent); font-family: var(--serif); font-size: 1.5rem; font-style: italic; letter-spacing: 0; }
  .footer-socials { display: flex; gap: 25px; }
  .footer-socials a { color: var(--muted); transition: color 0.3s, transform 0.3s; display: flex; align-items: center; justify-content: center; }
  .footer-socials a:hover { color: var(--accent); transform: translateY(-2px); }
  .footer-socials svg { width: 18px; height: 18px; }

  #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

  @media (max-width: 768px) {
    header { grid-template-columns: 1fr; gap: 30px; }
    .project-title { font-size: 2.5rem; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" style="text-decoration: none; color: inherit;">Henrique R</a>
  <div class="nav-links">
    <a href="index.html#work">Projects</a>
    <a href="sobre.html">About</a>
    <a href="contato.html">Contact</a>
    <div class="lang-switcher" style="display: flex; gap: 8px; align-items: center;">
      <a href="#" onclick="window.location.href='../projeto.html' + window.location.search; return false;" style="opacity: 0.4;" title="Português">
        <img src="https://flagcdn.com/br.svg" width="18" alt="BR" style="border-radius: 2px; display: block;">
      </a>
      <span style="opacity: 1; cursor: default;" title="English">
        <img src="https://flagcdn.com/us.svg" width="18" alt="US" style="border-radius: 2px; display: block;">
      </span>
    </div>
  </div>
</nav>

<header>
  <h1 id="proj-titulo" class="project-title">Loading...</h1>
  <p id="proj-descricao" class="project-desc"></p>
  <aside class="project-meta-grid">
    <div class="meta-item"><label>YEAR</label><span id="proj-ano">—</span></div>
    <div class="meta-item"><label>Disciplines</label><span id="proj-categoria">—</span></div>
  </aside>
</header>

<div id="galeria-container" class="gallery-grid"></div>

<section class="tools-section">
  <div class="tools-row" id="icons-container">
    <!-- JS preencherá aqui -->
  </div>
</section>

<footer id="footer">
  <div class="footer-brand">Henrique R</div>
  <div class="footer-socials">
    <a href="mailto:henriqver@gmail.com" aria-label="E-mail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
    </a>
    <a href="https://wa.me/5511983236151" target="_blank" aria-label="WhatsApp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
    </a>
    <a href="https://instagram.com/henriqver" target="_blank" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
    </a>
  </div>
</footer>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const projectId = urlParams.get('id');

  const iconLibrary = {
    "Photoshop": '<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="2" fill="#001E36"/><text x="4" y="16" font-family="serif" font-size="12" font-weight="bold" fill="#31A8FF">Ps</text></svg>',
    "Illustrator": '<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="2" fill="#300000"/><text x="4" y="16" font-family="serif" font-size="12" font-weight="bold" fill="#FF9A00">Ai</text></svg>',
    "InDesign": '<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="2" fill="#1A0030"/><text x="4" y="16" font-family="serif" font-size="12" font-weight="bold" fill="#FF3366">Id</text></svg>',
    "After Effects": '<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="2" fill="#00005B"/><text x="4" y="16" font-family="serif" font-size="12" font-weight="bold" fill="#D191FF">Ae</text></svg>',
    "Premiere Pro": '<svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="2" fill="#00005B"/><text x="4" y="16" font-family="serif" font-size="12" font-weight="bold" fill="#9999FF">Pr</text></svg>',
    "IA": '<svg viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1.5"><path d="M12 3l1.5 6.5L21 12l-7.5 2.5L12 21l-1.5-6.5L3 12l7.5-2.5L12 3z"/></svg>'
  };

  // 1. Caminho ajustado para buscar o JSON na pasta raiz
  fetch('../projetos.json')
    .then(response => response.json())
    .then(data => {
      const projeto = data.lista.find(p => p.id === projectId);
      if (projeto) {
        
        // 2. Prioriza os textos em inglês (com fallback para português)
        const tituloProjeto = projeto.titulo_en || projeto.titulo;
        document.getElementById('proj-titulo').innerText = tituloProjeto;
        document.getElementById('proj-descricao').innerText = projeto.descricao_en || projeto.descricao;
        document.getElementById('proj-ano').innerText = projeto.ano || "";
        document.getElementById('proj-categoria').innerText = projeto.categoria_en || projeto.categoria || "";
        
        const iconsBox = document.getElementById('icons-container');
        let softwares = projeto.software || [];
        if (typeof softwares === 'string') softwares = softwares.split(',').map(s => s.trim());

        softwares.forEach(item => {
           const iconHtml = iconLibrary[item] || '<svg viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1"><circle cx="12" cy="12" r="10"/></svg>';
           iconsBox.innerHTML += `
             <div class="tool-item">
               <div class="tool-icon">${iconHtml}</div>
               <span class="tool-label">${item}</span>
             </div>`;
        });

        // Passando o título para ser usado na tag alt das fotos
        carregarSequenciaFotos(1, projeto.formato_galeria, tituloProjeto); 
      }
    });

  function carregarSequenciaFotos(index, formato, tituloProjeto) {
    const nomeArquivo = `${projectId} (${index})`;
    
    // 3. Caminho da imagem ajustado com ../
    const caminhoBase = `../assets/images/projetos/${projectId}/${nomeArquivo}`;
    
    // 4. Priorizando o WebP
    const extensoes = ['.webp', '.png', '.jpg', '.jpeg'];
    let tentativa = 0;

    function testar() {
      if (tentativa >= extensoes.length) return;
      const imgTeste = new Image();
      imgTeste.src = caminhoBase + extensoes[tentativa];
      
      imgTeste.onload = function() {
        const img = document.createElement('img');
        img.src = this.src;
        img.className = 'gallery-img';
        
        // 5. Otimização e SEO
        img.loading = 'lazy'; 
        img.alt = tituloProjeto;

        if (formato === "original" && this.width > this.height) img.classList.add('landscape');
        
        img.onclick = () => { 
          document.getElementById('lightbox-img').src = img.src; 
          document.getElementById('lightbox').style.display = 'flex'; 
        };
        
        document.getElementById('galeria-container').appendChild(img);
        carregarSequenciaFotos(index + 1, formato, tituloProjeto);
      };
      imgTeste.onerror = () => { tentativa++; testar(); };
    }
    testar();
  }
</script>
</body>
