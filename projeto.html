<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto | Henrique R</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111111;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e; --text: #f0ede8; --muted: #888880;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; }
  
  nav { position: fixed; top: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; }
  .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-style: italic; text-decoration: none; color: var(--text); }

  header { margin-top: 120px; padding: 0 5%; }
  .project-title { font-size: 4rem; font-family: var(--serif); font-weight: 300; margin-bottom: 20px; }
  .project-desc { font-size: 1.2rem; color: var(--muted); max-width: 800px; line-height: 1.6; }

  /* Implementação Masonry (Pinterest Style)[cite: 1] */
  .gallery-grid { 
    column-count: 4; 
    column-gap: 20px; 
    padding: 5%; 
    margin-top: 40px;
  }
  
  .gallery-img { 
    width: 100%; 
    display: block;
    margin-bottom: 20px; /* Espaço entre imagens na mesma coluna[cite: 1] */
    border-radius: 4px; 
    cursor: zoom-in; 
    transition: opacity 0.3s;
    break-inside: avoid; /* Evita que a imagem quebre entre colunas[cite: 1] */
  }
  .gallery-img:hover { opacity: 0.8; }

  #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

  @media (max-width: 768px) {
    .gallery-grid { column-count: 2; column-gap: 15px; }
    .project-title { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Henrique R</a>
</nav>

<header>
  <h1 id="proj-titulo" class="project-title">Carregando...</h1>
  <p id="proj-descricao" class="project-desc"></p>
</header>

<div id="galeria-container" class="gallery-grid"></div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const projectId = urlParams.get('id');
  const galeria = document.getElementById('galeria-container');

  fetch('projetos.json')
    .then(response => response.json())
    .then(data => {
      const projeto = data.lista.find(p => p.id === projectId);
      if (projeto) {
        document.getElementById('proj-titulo').innerText = projeto.titulo;
        document.getElementById('proj-descricao').innerText = projeto.descricao;
        carregarSequenciaFotos(1, projeto.formato_galeria); 
      }
    });

  function carregarSequenciaFotos(index, formato) {
    const nomeArquivo = `${projectId} (${index})`;
    const caminhoBase = `assets/images/projetos/${projectId}/${nomeArquivo}`;
    const extensoes = ['.png', '.jpg', '.jpeg', '.webp'];
    
    let tentativaAtual = 0;

    function testarProximaExtensao() {
      if (tentativaAtual >= extensoes.length) return;

      const imgTeste = new Image();
      imgTeste.src = caminhoBase + extensoes[tentativaAtual];

      imgTeste.onload = function() {
        const img = document.createElement('img');
        img.src = this.src;
        img.className = 'gallery-img';
        
        // Ajuste dinâmico com base na escolha do CMS[cite: 1]
        if (formato === "original") {
            img.style.aspectRatio = 'auto';
            img.style.objectFit = 'contain';
        } else {
            img.style.aspectRatio = '4/5';
            img.style.objectFit = 'cover';
        }

        img.onclick = () => {
          document.getElementById('lightbox-img').src = img.src;
          document.getElementById('lightbox').style.display = 'flex';
        };
        
        galeria.appendChild(img);
        carregarSequenciaFotos(index + 1, formato); 
      };

      imgTeste.onerror = function() {
        tentativaAtual++;
        testarProximaExtensao();
      };
    }
    testarProximaExtensao();
  }
</script>
</body>
</html>
