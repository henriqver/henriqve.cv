<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto | Henrique R</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e; --accent2: #e8d5b0;
    --text: #f0ede8; --muted: #888880; --dim: #444440;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; transition: color 0.3s; }
  a:hover { color: var(--accent); }
  
  /* Navbar com fundo sólido */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-style: italic; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 40px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* Projeto Estrutura */
  .tag { display: inline-block; padding: 4px 10px; border: 1px solid var(--accent); color: var(--accent); border-radius: 20px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-right: 15px;}
  .year { color: var(--muted); font-size: 0.9rem; }
  
  /* Galeria e Lightbox */
  .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .gallery-img { width: 100%; aspect-ratio: 4/5; object-fit: cover; border-radius: 4px; cursor: zoom-in; display: block; transition: opacity 0.3s; }
  .gallery-img:hover { opacity: 0.8; }
  
  #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 9999; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }

  /* Outros Projetos Grid */
  .other-projects-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
  .other-item { aspect-ratio: 3/4; overflow: hidden; background: var(--surface); border-radius: 4px; margin-bottom: 20px; border: 1px solid var(--border2); position: relative; }
  .other-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
  .other-card:hover .other-item img { transform: scale(1.05); }

  /* Footer Minimalista */
  footer { padding: 60px 5%; border-top: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  .footer-brand { color: var(--accent); font-family: var(--serif); font-size: 1.5rem; font-style: italic; letter-spacing: 0; }
  .footer-socials { display: flex; gap: 25px; }
  .footer-socials a { color: var(--muted); transition: color 0.3s, transform 0.3s; display: flex; align-items: center; justify-content: center; }
  .footer-socials a:hover { color: var(--accent); transform: translateY(-2px); }
  .footer-socials svg { width: 18px; height: 18px; }

  /* Responsivo */
  @media (max-width: 768px) {
    .project-details { grid-template-columns: 1fr !important; gap: 20px !important; }
    #proj-titulo { font-size: 2.5rem !important; }
    .nav-links { display: none; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .other-projects-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Henrique R</a>
  <div class="nav-links">
    <a href="index.html#work">Projetos</a>
    <a href="sobre.html">Sobre</a>
    <a href="contato.html">Contato</a>
  </div>
</nav>

<!-- Cabeçalho do Projeto -->
<header class="project-header" style="margin-top: 120px; padding: 0 5%;">
  <div class="project-meta">
    <span id="proj-categoria" class="tag">A carregar...</span>
    <span id="proj-ano" class="year">...</span>
  </div>
  <h1 id="proj-titulo" class="project-title" style="font-size: 4rem; margin: 20px 0; font-family: var(--serif); font-weight: 300;">A carregar projeto...</h1>
  
  <div class="project-details" style="display: grid; grid-template-columns: 1fr 2fr; gap: 40px; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 40px;">
    <div class="project-info">
      <p style="margin-bottom: 10px;"><strong>Cliente:</strong> <span id="proj-cliente" style="color: var(--muted);">...</span></p>
      <p><strong>Papel:</strong> <span id="proj-papel" style="color: var(--muted);">...</span></p>
    </div>
    <div class="project-desc">
      <p id="proj-descricao" style="font-size: 1.2rem; line-height: 1.6; color: var(--muted);">...</p>
    </div>
  </div>
</header>

<!-- Galeria de Imagens Dinâmica -->
<section class="project-gallery" style="padding: 5%; margin-top: 40px;">
  <div id="galeria-container" class="gallery-grid">
    <!-- As imagens aparecerão aqui automaticamente -->
  </div>
</section>

<!-- Secção: Outros Projetos -->
<section class="other-projects" style="padding: 5%; margin-top: 60px; border-top: 1px solid var(--border);">
  <h3 style="font-family: var(--serif); font-size: 2.5rem; font-weight: 300; margin-bottom: 40px;">Outros Projetos</h3>
  
  <div id="outros-projetos-container" class="other-projects-grid">
    <!-- Os cartões aleatórios aparecerão aqui -->
  </div>
</section>

<footer id="footer">
  <div class="footer-brand">Henrique R</div>
  <div class="footer-socials">
    <a href="mailto:henriqver@gmail.com" aria-label="E-mail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
    </a>
    <a href="https://wa.me/5511983236151" target="_blank" aria-label="WhatsApp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
    </a>
    <a href="https://instagram.com/henriqver" target="_blank" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
    </a>
  </div>
</footer>

<!-- Modal Lightbox para expandir imagens -->
<div id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="Imagem Expandida">
</div>

<script>
  let todosOsProjetos = [];

  function pegarProjetosAleatorios(arrayDeProjetos, idAtual, quantidade) {
    const filtrados = arrayDeProjetos.filter(projeto => projeto.id !== idAtual);
    const embaralhados = filtrados.sort(() => 0.5 - Math.random());
    return embaralhados.slice(0, quantidade);
  }

  const urlParams = new URLSearchParams(window.location.search);
  const projectId = urlParams.get('id');

  fetch('projetos.json')
    .then(response => response.json())
    .then(data => {
      todosOsProjetos = data.lista || []; 
      const projeto = todosOsProjetos.find(p => p.id === projectId);

      if (projeto) {
        document.title = `${projeto.titulo} | Henrique R`;
        document.getElementById('proj-titulo').innerText = projeto.titulo;
        document.getElementById('proj-categoria').innerText = projeto.categoria;
        document.getElementById('proj-ano').innerText = projeto.ano;
        document.getElementById('proj-cliente').innerText = projeto.cliente;
        document.getElementById('proj-papel').innerText = projeto.papel;
        document.getElementById('proj-descricao').innerText = projeto.descricao;

        // Extração Inteligente das Imagens
        let urlsImagens = [];
        
        // Se as imagens vierem do novo campo em massa (texto Markdown)
        if (typeof projeto.imagens === 'string') {
            const regex = /!\[.*?\]\((.*?)\)/g;
            let resultado;
            while ((resultado = regex.exec(projeto.imagens)) !== null) {
                urlsImagens.push(resultado[1]);
            }
        } 
        // Se forem imagens antigas guardadas no formato de lista
        else if (Array.isArray(projeto.imagens)) {
            urlsImagens = projeto.imagens;
        }

        const galeria = document.getElementById('galeria-container');
        if (urlsImagens.length > 0) {
          urlsImagens.forEach(caminho => {
            const caminhoLimpo = caminho.startsWith('/') ? caminho.substring(1) : caminho;
            const img = document.createElement('img');
            img.src = caminhoLimpo;
            img.className = 'gallery-img';
            
            img.onclick = function() {
              document.getElementById('lightbox-img').src = this.src;
              document.getElementById('lightbox').style.display = 'flex';
            };
            
            galeria.appendChild(img);
          });
        }

        const sugestoes = pegarProjetosAleatorios(todosOsProjetos, projectId, 4);
        const containerSugestoes = document.getElementById('outros-projetos-container');

        sugestoes.forEach(sugestao => {
          let imagemCapa = '';
          
          // Lógica para encontrar a capa nos Outros Projetos
          if (typeof sugestao.imagens === 'string') {
              const match = /!\[.*?\]\((.*?)\)/.exec(sugestao.imagens);
              if (match) imagemCapa = match[1].startsWith('/') ? match[1].substring(1) : match[1];
          } else if (Array.isArray(sugestao.imagens) && sugestao.imagens.length > 0) {
              imagemCapa = sugestao.imagens[0].startsWith('/') ? sugestao.imagens[0].substring(1) : sugestao.imagens[0];
          }

          const cartaoHTML = `
            <a href="projeto.html?id=${sugestao.id}" class="other-card" style="display: block; cursor: pointer;">
              <div class="other-item">
                <img src="${imagemCapa}" alt="${sugestao.titulo}">
              </div>
              <div style="font-size: 0.8rem; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">${sugestao.categoria}</div>
              <div style="font-family: var(--serif); font-size: 1.8rem; line-height: 1.1;">${sugestao.titulo}</div>
            </a>
          `;
          containerSugestoes.innerHTML += cartaoHTML;
        });

      } else {
        document.getElementById('proj-titulo').innerText = "Projeto não encontrado.";
      }
    })
    .catch(error => console.error("Erro ao carregar o projeto:", error));
</script>

</body>
</html>
