<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henrique R — Portfolio</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e;
    --accent2: #e8d5b0;
    --text: #f0ede8;
    --muted: #888880;
    --dim: #444440;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  
  /* Navbar */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 25px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    mix-blend-mode: difference;
    z-index: 100;
  }
  .nav-logo {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-style: italic;
    color: var(--text);
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 40px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .nav-links a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* Hero */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 5%;
    position: relative;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(3rem, 10vw, 8rem);
    line-height: 0.9;
    font-weight: 300;
    letter-spacing: -2px;
  }
  .hero-title em { font-style: italic; color: var(--accent); }
  .hero-meta {
    margin-top: 40px;
    display: flex;
    gap: 60px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Grid de Trabalhos */
  .work-grid {
    padding: 0 5% 100px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
  }
  .work-item {
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }
  .work-placeholder {
    aspect-ratio: 4/5;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    transition: border-color 0.4s;
  }
  .work-item:hover .work-placeholder { border-color: var(--accent); }
  .work-overlay {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .work-name { font-family: var(--serif); font-size: 1.8rem; line-height: 1; }
  .work-tag { color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  /* Sobre */
  .about-section {
    padding: 150px 5%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px;
    border-top: 1px solid var(--border);
  }
  .about-label { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
  .about-title { font-family: var(--serif); font-size: 4rem; line-height: 1; font-weight: 300; margin-bottom: 40px; }
  .about-body { color: var(--muted); font-size: 1.2rem; line-height: 1.6; max-width: 500px; }
  
  .about-visual { display: flex; justify-content: center; align-items: center; }
  .about-frame {
    width: 300px;
    height: 400px;
    border: 1px solid var(--border2);
    position: relative;
    padding: 15px;
  }
  .about-frame-inner {
    width: 100%;
    height: 100%;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
  }

  /* Footer */
  footer {
    padding: 80px 5%;
    border-top: 1px solid var(--border);
  }
  .footer-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .footer-logo { font-family: var(--serif); font-size: 2.5rem; font-style: italic; color: var(--accent); }
  .footer-col { display: flex; flex-direction: column; gap: 10px; }
  .footer-col-title { color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .footer-col a { color: var(--text); text-decoration: none; font-size: 1.1rem; }

  @media (max-width: 768px) {
    .work-grid, .about-section { grid-template-columns: 1fr; }
    .hero-meta { flex-direction: column; gap: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Henrique R</a>
  <div class="nav-links">
    <a href="#work">Projetos</a>
    <a href="portfolio_sobre_v3.html">Sobre</a>
    <a href="portfolio_contato_v3.html">Contato</a>
  </div>
</nav>

<section class="hero">
  <h1 class="hero-title">Multidisciplinary<br><em>Graphic</em> Designer</h1>
  <div class="hero-meta">
    <div>Basado em São Paulo</div>
    <div>Disponível para Projetos 2026</div>
    <div>Especialista em Visual Identity</div>
  </div>
</section>

<section class="work-grid" id="work">
  <a href="projeto.html?id=marilia-ac" style="text-decoration: none; color: inherit;">
    <div class="work-item">
      <div class="work-placeholder">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="work-overlay">
        <div>
            <div class="work-tag">Sports Design</div>
            <div class="work-name">Marília AC — Matchday</div>
        </div>
      </div>
    </div>
  </a>

  </section>

<footer id="footer">
  <div class="footer-top">
    <div>
      <div class="footer-logo">Henrique R</div>
      <div class="footer-tagline">Design Gráfico — São Paulo, BR</div>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">Contato</div>
      <a href="mailto:henriqver@gmail.com">henriqver@gmail.com</a>
      <a href="https://instagram.com/henriquer" target="_blank">@henriquer</a>
    </div>
  </div>
</footer>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

</body>
</html>
