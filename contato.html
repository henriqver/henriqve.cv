<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato | Henrique R</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e; --accent2: #e8d5b0;
    --text: #f0ede8; --muted: #888880; --dim: #444440;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  
  /* Navbar com fundo sólido */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }
  .nav-logo { font-family: var(--serif); font-size: 1.4rem; font-style: italic; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 40px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .nav-links a { color: var(--text); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--accent); }

  /* Contacto Section */
  /* align-items: center faz com que a coluna da esquerda fique centrada em relação à da direita */
  .contact-section { padding: 150px 5% 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; min-height: 80vh; align-items: center; }
  
  .contact-name { font-family: var(--serif); font-size: 3.5rem; font-weight: 300; line-height: 1.1; margin-bottom: 40px; letter-spacing: -1px; }

  .social-links { display: flex; flex-direction: column; gap: 20px; }
  .social-links a { display: inline-flex; align-items: center; gap: 15px; color: var(--text); text-decoration: none; font-size: 1.1rem; transition: color 0.3s; }
  .social-links a:hover { color: var(--accent); }
  .social-links svg { width: 20px; height: 20px; stroke: var(--muted); transition: stroke 0.3s; }
  .social-links a:hover svg { stroke: var(--accent); }

  /* Formulário Simulado */
  .contact-form { background: var(--surface); padding: 50px; border: 1px solid var(--border); border-radius: 4px; }
  .form-group { margin-bottom: 30px; }
  .form-group label { display: block; color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .form-control { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 1rem; padding: 10px 0; transition: border-color 0.3s; }
  .form-control:focus { outline: none; border-color: var(--accent); }
  textarea.form-control { resize: vertical; min-height: 100px; }

  .btn-send { background: transparent; border: 1px solid var(--accent); color: var(--text); padding: 15px 30px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.4s; display: inline-flex; align-items: center; gap: 10px; }
  .btn-send svg { width: 16px; transition: transform 0.4s; }
  .btn-send:hover { background: var(--accent); color: var(--bg); }
  .btn-send:hover svg { transform: translateX(5px); stroke: var(--bg); }

  /* Footer Minimalista */
  footer { padding: 60px 5%; border-top: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
  .footer-brand { color: var(--accent); font-family: var(--serif); font-size: 1.5rem; font-style: italic; letter-spacing: 0; }
  .footer-socials { display: flex; gap: 25px; }
  .footer-socials a { color: var(--muted); transition: color 0.3s, transform 0.3s; display: flex; align-items: center; justify-content: center; }
  .footer-socials a:hover { color: var(--accent); transform: translateY(-2px); }
  .footer-socials svg { width: 18px; height: 18px; }

  @media (max-width: 768px) {
    .contact-section { grid-template-columns: 1fr; gap: 60px; }
    .contact-name { font-size: 3rem; }
    .contact-form { padding: 30px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Henrique R</a>
  <div class="nav-links">
    <a href="index.html#work">Projetos</a>
    <a href="sobre.html">Sobre</a>
    <a href="contato.html">Contato</a>
  </div>
</nav>

<section class="contact-section">
  <div class="contact-info">
    <h1 class="contact-name">Henrique Rodrigues</h1>
    <div class="social-links">
      <a href="mailto:henriqver@gmail.com">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        henriqver@gmail.com
      </a>
      <a href="https://wa.me/5511983236151" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        +55 11 98323 6151
      </a>
      <a href="https://instagram.com/henriqver" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        @henriqver

  </div>

  <div class="contact-form">
    <div class="form-group">
      <label>Nome</label>

    <div class="form-group">

    <div class="form-group">
      <label>Mensagem</label>
      <textarea id="mensagem" class="form-control"></textarea>
    </div>
    <button class="btn-send" onclick="enviar()">
      Enviar mensagem

        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</section>

<footer id="footer">
  <div class="footer-brand">Henrique R</div>
  <div class="footer-socials">
    <a href="mailto:henriqver@gmail.com" aria-label="E-mail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

    <a href="https://instagram.com/henriqver" target="_blank" aria-label="Instagram">

  </div>

<script>
  function enviar() {
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const mensagem = document.getElementById('mensagem').value.trim();
    
    if (!nome || !email || !mensagem) { 
        alert('Por favor, preencha os campos obrigatórios (Nome, E-mail e Mensagem).');
        return; 
    }
    
    alert('Formulário enviado com sucesso! Entrarei em contacto em breve.');
    
    // Limpa os campos após enviar
    document.getElementById('nome').value = '';
    document.getElementById('email').value = '';
    document.getElementById('assunto').value = '';
    document.getElementById('mensagem').value = '';
  }
</script>

</body>
</html>
