<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --accent: #c8a96e; --accent2: #e8d5b0;
    --text: #f0ede8; --muted: #888880; --dim: #444440;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'Space Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.6; overflow-x: hidden; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 3rem; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); background: rgba(10,10,10,0.88); }
  .nav-logo { font-family: var(--serif); font-size: 1.15rem; font-weight: 300; letter-spacing: 0.1em; color: var(--accent2); text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover { color: var(--accent); }

  .contact-main {
    min-height: calc(100vh - 80px);
    padding: 10rem 3rem 6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
  }

  .contact-form {
    display: flex; flex-direction: column; gap: 1.2rem;
    width: 100%; max-width: 680px;
  }

  .field-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .field-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }

  .field-input {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 0.9rem 1rem; outline: none; transition: border-color 0.3s;
    width: 100%; border-radius: 0; appearance: none;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--dim); }

  .field-textarea {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 0.9rem 1rem; outline: none; transition: border-color 0.3s;
    width: 100%; border-radius: 0; resize: vertical; min-height: 180px;
    line-height: 1.8; appearance: none;
  }
  .field-textarea:focus { border-color: var(--accent); }
  .field-textarea::placeholder { color: var(--dim); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .btn-send {
    display: inline-flex; align-items: center; gap: 0.8rem;
    margin-top: 0.4rem; padding: 0.9rem 2rem;
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: background 0.3s, color 0.3s;
    align-self: flex-start;
  }
  .btn-send:hover { background: var(--accent); color: var(--bg); }
  .btn-send svg { width: 14px; height: 14px; transition: transform 0.3s; }
  .btn-send:hover svg { transform: translateX(3px); }

  footer { border-top: 1px solid var(--border); padding: 3.5rem 3rem; }
  .footer-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .footer-logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 300; color: var(--accent2); margin-bottom: 0.6rem; }
  .footer-tagline { font-size: 11px; color: var(--dim); letter-spacing: 0.1em; }
  .footer-col-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); margin-bottom: 1rem; }
  .footer-col a { display: block; font-size: 12px; color: var(--muted); text-decoration: none; line-height: 2.2; transition: color 0.3s; }
  .footer-col a:hover { color: var(--accent); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fu { animation: fadeUp 0.8s cubic-bezier(0.25,0.46,0.45,0.94) both; }

  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; }
    .contact-main { padding: 7rem 1.5rem 5rem; }
    .form-row { grid-template-columns: 1fr; }
    footer { padding: 3rem 1.5rem; }
    .footer-top { flex-direction: column; gap: 2.5rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">Henrique R</a>
  <ul class="nav-links">
    <li><a href="#">Sobre Mim</a></li>
    <li><a href="#">Contato</a></li>
  </ul>
</nav>

<section class="contact-main">
  <div class="contact-form fu">
    <div class="form-row">
      <div class="field-group">
        <label class="field-label" for="nome">Nome</label>
        <input class="field-input" type="text" id="nome" placeholder="Seu nome">
      </div>
      <div class="field-group">
        <label class="field-label" for="email">E-mail</label>
        <input class="field-input" type="email" id="email" placeholder="seu@email.com">
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" for="assunto">Assunto</label>
      <input class="field-input" type="text" id="assunto" placeholder="Identidade visual, editorial, embalagem...">
    </div>
    <div class="field-group">
      <label class="field-label" for="mensagem">Mensagem</label>
      <textarea class="field-textarea" id="mensagem" placeholder="Conte um pouco sobre o seu projeto..."></textarea>
    </div>
    <button class="btn-send" onclick="enviar()">
      Enviar mensagem
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</section>

<footer id="footer">
  <div class="footer-top">
    <div>
      <div class="footer-logo">Henrique R</div>
      <div class="footer-tagline">Design Gráfico — São Paulo, BR</div>
    </div>
    <div class="footer-col">
      <div class="footer-col-title">Contato</div>
      <a href="mailto:henriqver@gmail.com">henriqver@gmail.com</a>
      <a href="tel:+5511999999999">+55 11 99999-9999</a>
      <a href="https://instagram.com/henriquer" target="_blank">@henriquer</a>
    </div>
  </div>
</footer>

<script>
  function enviar() {
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const assunto = document.getElementById('assunto').value.trim();
    const mensagem = document.getElementById('mensagem').value.trim();
    if (!nome || !email || !mensagem) { alert('Por favor, preencha nome, e-mail e mensagem.'); return; }
    const subjectEncoded = encodeURIComponent(assunto || 'Contato pelo portfólio');
    const bodyEncoded = encodeURIComponent('Nome: ' + nome + '\nE-mail: ' + email + '\n\n' + mensagem);
    window.location.href = 'mailto:henriqver@gmail.com?subject=' + subjectEncoded + '&body=' + bodyEncoded;
  }
</script>

</body>
</html>
